name: Refresh Daily Static Data

on:
  schedule:
    - cron: "20 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      AMAZON_CRAWL_CATEGORY_LIMIT: "5"
      AMAZON_MOCK_CRAWL: "0"
      AMAZON_CRAWL_SOURCE: "jina_ai"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate static data
        run: |
          cd backend
          python3 scripts/publish_static_data.py --source auto --sites amazon.com --boards best_sellers --fail-on-mock --strict

      - name: Commit and push data updates
        run: |
          if git diff --quiet -- backend/app/web/data; then
            echo "No data changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add backend/app/web/data
          git commit -m "chore(data): refresh daily static data"
          git push
