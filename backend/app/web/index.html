<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Amazon 热门榜后台 - 排行榜</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body data-page="ranks">
    <header>
      <h1>Amazon 热门榜后台</h1>
      <p>GitHub Pages 静态日榜：每天自动更新，可离线筛选</p>
      <nav class="page-nav" aria-label="主导航">
        <a class="nav-link active" href="./index.html">排行榜</a>
        <a class="nav-link" href="./insights.html">竞品洞察</a>
        <a class="nav-link" href="./product.html">单品分析</a>
      </nav>
    </header>

    <main>
      <section class="card status-card">
        <h2>数据状态</h2>
        <div id="statusBanner" class="status-banner status-loading">数据加载中</div>
        <p class="muted">状态: <code id="dataStatus">loading</code></p>
        <p class="muted">数据来源: <code id="dataSource">-</code></p>
        <p class="muted">最后成功日期: <code id="lastSuccessDate">-</code></p>
        <p class="muted">最后尝试时间: <code id="lastAttemptAt">-</code></p>
      </section>

      <section class="card">
        <h2>筛选</h2>
        <div class="row">
          <select id="snapshot_date"></select>
          <button id="compareYesterday" type="button">一键对比昨日</button>
          <button id="clearCompare" type="button">清除对比</button>
          <select id="site">
            <option value="amazon.com">amazon.com</option>
            <option value="amazon.co.jp">amazon.co.jp</option>
            <option value="amazon.co.uk">amazon.co.uk</option>
          </select>
          <select id="board_type">
            <option value="best_sellers">best_sellers</option>
            <option value="new_releases">new_releases</option>
            <option value="movers_and_shakers">movers_and_shakers</option>
          </select>
          <select id="category_key">
            <option value="">全部类目</option>
          </select>
          <select id="has_price">
            <option value="1">仅有价格</option>
            <option value="0">包含无价格</option>
          </select>
          <input id="top_n" type="number" min="1" max="100" value="100" placeholder="Top N" />
          <select id="sort_by">
            <option value="rank">按排名</option>
            <option value="sales_day">按当日销量</option>
            <option value="sales_month">按近30天销量</option>
            <option value="sales_year">按近1年销量</option>
            <option value="rating">按评分</option>
            <option value="review_count">按评论数</option>
          </select>
          <select id="sort_order">
            <option value="asc">升序</option>
            <option value="desc">降序</option>
          </select>
          <input id="keyword" placeholder="关键词(商品名/ASIN)" />
          <button id="searchRanks" type="button">筛选</button>
          <button id="downloadCsv" type="button">导出 CSV</button>
          <a class="action-link" href="./insights.html">前往竞品洞察</a>
        </div>
        <div class="row" id="recentDateButtons"></div>
        <div id="querySummary"></div>
      </section>

      <section class="card">
        <h2>排行榜</h2>
        <div class="table-wrap">
          <table id="ranksTable">
            <thead>
              <tr>
                <th>日期</th><th>站点</th><th>榜单</th><th>类目</th>
                <th>排名</th><th>较昨日</th><th>当日销量(估)</th><th>近30天销量(估)</th><th>近1年销量(估)</th><th>ASIN</th><th>商品名</th><th>品牌</th>
                <th>价格</th><th>评分</th><th>评论数</th><th>详情</th><th>销量趋势</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

    </main>

    <div id="trendModal" class="trend-modal" aria-hidden="true">
      <div class="trend-dialog" role="dialog" aria-modal="true" aria-labelledby="trendTitle">
        <div class="trend-header">
          <h3 id="trendTitle">近一年销量趋势</h3>
          <button id="trendClose" type="button" class="secondary-btn">关闭</button>
        </div>
        <p id="trendInfo" class="muted">请选择商品查看走势</p>
        <div id="trendChart" class="trend-chart"></div>
        <div class="table-wrap trend-table-wrap">
          <table id="trendTable">
            <thead>
              <tr>
                <th>日期</th><th>排名</th><th>当日销量(估)</th><th>近30天销量(估)</th><th>近1年销量(估)</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="./app.js?v=20260305c"></script>
  </body>
</html>
